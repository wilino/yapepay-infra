name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Test (jest)
        run: npm test --silent

      # `cdk synth` se ejecuta sin credenciales AWS reales: el entrypoint usa
      # `process.env.CDK_DEFAULT_ACCOUNT` (puede ser undefined) y region por
      # defecto desde devConfig. Se inyectan dummies por seguridad.
      - name: CDK synth (dry run, sin credenciales)
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: us-east-1
        run: npx cdk synth
